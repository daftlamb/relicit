<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Glyph It &#8212; Chinese Character Poster</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f0ece4;--panel-bg:#fff;--border:#e0d8cc;--text:#1a1a1a;--muted:#888;--accent:#8b4513;--header-bg:#fff;--header-h:44px}
[data-theme="dark"]{--bg:#141414;--panel-bg:#1e1e1e;--border:#2a2a2a;--text:#f0f0f0;--muted:#666;--accent:#c8941a;--header-bg:#0e0e0e}
html,body{height:100%;overflow:hidden}
body{font-family:'Outfit','Noto Serif SC',sans-serif;font-size:13px;background:var(--bg);color:var(--text);display:flex;flex-direction:column}
header{height:var(--header-h);background:var(--header-bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;z-index:100}
.brand{font-size:16px;font-weight:500;font-family:'Outfit',sans-serif}
.brand-it{color:var(--accent)}
.header-spacer{flex:1}
.btn-icon{background:none;border:1px solid var(--border);color:var(--text);border-radius:6px;height:28px;cursor:pointer;font-family:inherit;font-size:12px;padding:0 10px;transition:all .15s}
.btn-icon:hover{border-color:var(--accent);color:var(--accent)}
#app{display:flex;flex:1;min-height:0}
#panel{width:300px;flex-shrink:0;background:var(--panel-bg);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.panel-section{padding:14px 16px;border-bottom:1px solid var(--border)}
.section-title{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.btn{background:none;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 10px;font-family:inherit;font-size:12px;cursor:pointer;transition:all .15s}
.btn:hover,.btn.active{border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--accent);border:none;color:#fff;border-radius:6px;padding:9px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;width:100%;margin-top:10px;transition:opacity .15s}
.btn-primary:hover{opacity:.85}
.char-input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px;font-family:'Noto Serif SC',serif;font-size:36px;text-align:center;outline:none;transition:border-color .15s}
.char-input:focus{border-color:var(--accent)}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.chip{background:none;border:1px solid var(--border);color:var(--text);border-radius:5px;padding:3px 8px;font-family:'Noto Serif SC',serif;font-size:16px;cursor:pointer;transition:all .15s}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.btn-group{display:flex;gap:4px;flex-wrap:wrap}
.btn-group .btn{font-size:11px;padding:4px 10px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-size:12px}
.toggle-switch{position:relative;width:32px;height:18px;cursor:pointer;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;background:var(--border);border-radius:9px;transition:background .2s}
.toggle-switch input:checked+.toggle-track{background:var(--accent)}
.toggle-knob{position:absolute;top:2px;left:2px;width:14px;height:14px;background:#fff;border-radius:50%;transition:transform .2s;pointer-events:none;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle-switch input:checked~.toggle-knob{transform:translateX(14px)}
#panel-export{padding:14px 16px;margin-top:auto;border-top:1px solid var(--border)}
#status{font-size:11px;color:var(--muted);min-height:14px;margin-top:6px}
#canvas-area{flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg);overflow:hidden}
#glyph-canvas{border-radius:4px;box-shadow:0 4px 32px rgba(0,0,0,.15)}
@media(max-width:700px){
  #app{flex-direction:column;position:relative}
  #canvas-area{width:100%;flex:1;min-height:0;order:1}
  #panel{
    position:fixed;
    bottom:0;left:0;right:0;
    width:100%;
    height:64px;
    max-height:88vh;
    border-right:none;
    border-top:1px solid var(--border);
    border-radius:16px 16px 0 0;
    z-index:100;
    transition:height .3s cubic-bezier(.4,0,.2,1);
    overflow:hidden;
    box-shadow:0 -4px 24px rgba(0,0,0,.15);
    order:2;
  }
  #panel.drawer-open{height:82vh}
  #panel-inner{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column}
  #drawer-handle{
    display:flex;
    align-items:center;
    justify-content:center;
    height:48px;
    cursor:pointer;
    flex-shrink:0;
    touch-action:none;
    padding:0 16px;
    position:relative;
  }
  #drawer-handle::before{
    content:'';
    width:36px;height:4px;
    background:var(--border);
    border-radius:2px;
    position:absolute;
    top:10px;
    left:50%;
    transform:translateX(-50%);
  }
  #drawer-quick-gen{
    position:absolute;
    right:16px;
    top:50%;
    transform:translateY(-50%);
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:8px;
    padding:6px 14px;
    font-family:inherit;
    font-size:13px;
    font-weight:500;
    cursor:pointer;
  }
  #canvas-area{padding-bottom:48px}
  #panel{height:48px}
  #panel.drawer-open{height:82vh}
}
@media(min-width:701px){
  #drawer-handle{display:none}
  #panel-inner{height:100%;overflow-y:auto;display:flex;flex-direction:column}
}
</style>
</head>
<body>
<header>
  <div class="brand">Glyph<span class="brand-it">It</span></div>
  <div class="header-spacer"></div>
  <button class="btn-icon" id="btn-export-hdr">&#8595; PNG</button>
  <button class="btn-icon" id="btn-theme">&#9789;</button>
</header>
<div id="app">
  <div id="panel">
    <div id="drawer-handle">
      <button id="drawer-quick-gen">✦ Generate</button>
    </div>
    <div id="panel-inner">
    <div class="panel-section">
      <div class="section-title">Character</div>
      <input class="char-input" id="char-input" maxlength="1" placeholder="&#23383;" autocomplete="off" spellcheck="false"/>
      <div class="chips" id="preset-chips"></div>
      <button class="btn-primary" id="btn-generate">Generate Poster</button>
    </div>
    <div class="panel-section">
      <div class="section-title">Style</div>
      <div class="btn-group" id="scheme-group">
        <button class="btn active" data-scheme="parchment">Parchment</button>
        <button class="btn" data-scheme="ink">Ink</button>
        <button class="btn" data-scheme="night">Night</button>
        <button class="btn" data-scheme="minimal">Minimal</button>
        <button class="btn" data-scheme="crimson">Crimson</button>
        <button class="btn" data-scheme="forest">Forest</button>
        <button class="btn" data-scheme="dusk">Dusk</button>
        <button class="btn" data-scheme="paper">Paper</button>
      </div>
    </div>
    <div class="panel-section">
      <div class="section-title">Display</div>
      <div class="toggle-row">
        <span>Show stroke order</span>
        <label class="toggle-switch"><input type="checkbox" id="tog-strokes" checked/><div class="toggle-track"></div><div class="toggle-knob"></div></label>
      </div>
      <div class="toggle-row">
        <span>Show etymology</span>
        <label class="toggle-switch"><input type="checkbox" id="tog-etym" checked/><div class="toggle-track"></div><div class="toggle-knob"></div></label>
      </div>
      <div class="toggle-row">
        <span>Animate strokes</span>
        <label class="toggle-switch"><input type="checkbox" id="tog-anim"/><div class="toggle-track"></div><div class="toggle-knob"></div></label>
      </div>
      <div class="toggle-row">
        <span>Color ink</span>
        <label class="toggle-switch"><input type="checkbox" id="tog-color"/><div class="toggle-track"></div><div class="toggle-knob"></div></label>
      </div>
      <div class="toggle-row">
        <span>Flow lines</span>
        <label class="toggle-switch"><input type="checkbox" id="tog-fog" checked/><div class="toggle-track"></div><div class="toggle-knob"></div></label>
      </div>
    </div>
    <div id="panel-export">
      <div class="section-title">Export</div>
      <button class="btn-primary" id="btn-export-panel">&#8595; Download PNG</button>
      <div id="status"></div>
    </div>
    </div><!-- /panel-inner -->
  </div><!-- /panel -->
  <div id="canvas-area">
    <canvas id="glyph-canvas" width="520" height="680"></canvas>
  </div>
</div>
<script>
// ── Mobile drawer ────────────────────────────────────────────────────────────
(function(){
  var panel = document.getElementById('panel');
  var handle = document.getElementById('drawer-handle');
  if (!handle || !panel) return;
  var isOpen = false, startY = 0, startH = 0, dragging = false;
  function setOpen(open) {
    isOpen = open;
    panel.classList.toggle('drawer-open', open);
    panel.style.height = '';
  }
  // Quick generate button — runs generate then closes drawer
  var quickBtn = document.getElementById('drawer-quick-gen');
  if (quickBtn) {
    quickBtn.addEventListener('click', function(e){
      e.stopPropagation();
      // trigger generate (defined in main IIFE)
      var genBtn = document.getElementById('btn-generate');
      if (genBtn) genBtn.click();
      setOpen(false); // collapse drawer so animation is visible
    });
  }
  handle.addEventListener('click', function(){ if (!dragging) setOpen(!isOpen); });
  handle.addEventListener('touchstart', function(e){
    startY = e.touches[0].clientY; startH = panel.offsetHeight; dragging = false;
    panel.style.transition = 'none';
  }, {passive:true});
  handle.addEventListener('touchmove', function(e){
    var dy = startY - e.touches[0].clientY;
    if (Math.abs(dy) > 4) dragging = true;
    panel.style.height = Math.max(64, Math.min(window.innerHeight * 0.88, startH + dy)) + 'px';
  }, {passive:true});
  handle.addEventListener('touchend', function(){
    panel.style.transition = '';
    setOpen(panel.offsetHeight > window.innerHeight * 0.3);
    setTimeout(function(){ dragging = false; }, 50);
  });
})();

// IDS Decomposition
var IDS = {
  '明':['日','月'], '森':['木','木','木'], '淼':['水','水','水'],
  '焱':['火','火','火'], '品':['口','口','口'], '晶':['日','日','日'],
  '众':['人','人','人'], '林':['木','木'], '炎':['火','火'],

  '鸣':['口','鸟'], '鲜':['鱼','羊'], '美':['羊','大'],
  '善':['羊','言']
};

// Preset chips
var PRESETS = ['山','水','火','木','日','月','人','心','道','美','爱','明','森','炎'];

// State
var currentScheme = 'parchment';
var glyphCache = {};
var animTimer = null;


// DOM refs
var canvas = document.getElementById('glyph-canvas');
var ctx = canvas.getContext('2d');
// Retina / HiDPI support
var DPR = window.devicePixelRatio || 1;
var CW = 720, CH = 1020;
canvas.width = CW * DPR;
canvas.height = CH * DPR;
canvas.style.width = CW + 'px';
canvas.style.height = CH + 'px';
ctx.scale(DPR, DPR);
var charInput = document.getElementById('char-input');
var status = document.getElementById('status');

function setStatus(msg) { status.textContent = msg; }

// ── Preset chips ──────────────────────────────────────────────────────────────
var chipsEl = document.getElementById('preset-chips');
PRESETS.forEach(function(ch) {
  var btn = document.createElement('button');

  btn.textContent = ch;

    charInput.value = ch;
    generate();
  });

// ── Scheme buttons ────────────────────────────────────────────────────────────
document.getElementById('scheme-group').addEventListener('click', function(e) {

  if (!btn) return;
  document.querySelectorAll('#scheme-group .btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  currentScheme = btn.dataset.scheme;
  var ch = charInput.value.trim();
  if (ch && glyphCache[ch]) {

// ── Theme toggle ──────────────────────────────────────────────────────────────
var isDark = false;
document.getElementById('btn-theme').addEventListener('click', function() {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : '');
  this.textContent = isDark ? '☀' : '☽';
});

// ── Generate ──────────────────────────────────────────────────────────────────
document.getElementById('btn-generate').addEventListener('click', generate);
charInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') generate(); });

function generate() {
  var ch = charInput.value.trim();
  if (!ch) { setStatus('Please enter a character.'); return; }
  ch = ch[0];
  charInput.value = ch;

  // Build etymInfo: use embedded ETYM or fetch basic pinyin from CDN data
  function withEtym(callback) {
    if (ETYM[ch]) { callback(ETYM[ch]); return; }
    // Get pinyin + stroke count from hanzi-writer data
    fetchGlyph(ch, function(data) {
      var etym = null;
      if (data) {
        etym = {
          pinyin: (data.pinyin && data.pinyin.length) ? data.pinyin.join('/') : '',
          meaning: '',
          strokes: data.strokes ? data.strokes.length : 0
        };
      }
      callback(etym);
    }, true);
  }

  setStatus('Loading...');
  withEtym(function(etymInfo) {
    fetchGlyph(ch, function(data) {
      if (!data) {
        setStatus('No stroke data for this character.');
        drawPoster(ch, null, etymInfo);
        return;
      }
      setStatus('');
      var animOn = document.getElementById('tog-anim').checked;
      if (animOn) {
        animatePoster(ch, data, etymInfo);
      } else {
        drawPoster(ch, data, etymInfo);
      }
    });
  });
}

// ── Fetch glyph data ──────────────────────────────────────────────────────────
function fetchGlyph(ch, callback, skipCache) {
  if (!skipCache && glyphCache[ch] !== undefined) {
    callback(glyphCache[ch]);
    return;
  }
  var codepoint = ch.codePointAt(0).toString(16).toUpperCase();
  var url = 'https://cdn.jsdelivr.net/npm/hanzi-writer-data@latest/' + encodeURIComponent(ch) + '.json';
  fetch(url)
    .then(function(r) { return r.ok ? r.json() : Promise.reject('HTTP ' + r.status); })
    .then(function(data) {
      glyphCache[ch] = data;
      callback(data);
    })
    .catch(function() {
      glyphCache[ch] = null;
      callback(null);
    });
}

// ── Ink wash renderer: splatter dots inside stroke path — sumi-e style ────────
// depthFocus: 0.0=far(sparse,small dots) 1.0=near(dense,larger dots)
function renderInkStroke(ctx, strokePath, cx, cy, size, inkCol, holeSeed, depthFocus, colorPalette) {
  if (depthFocus === undefined) depthFocus = 0.7;
  // depthFocus controls: dot density keep%, dot size, jitter amount
  // fontChar: if set, use font glyph pixels masked by strokePath (method Y)

  // 1. Build pixel mask on offscreen canvas — cap at 512px to avoid huge allocations
  var sampleSz = Math.min(size, 512);
  var szScale = size / sampleSz;
  var ofc = document.createElement('canvas');
  ofc.width = sampleSz; ofc.height = sampleSz;
  var ofx = ofc.getContext('2d');

    // Default: use hanzi-writer stroke path directly
    ofx.save();
    ofx.translate(sampleSz/2, sampleSz/2);
    ofx.scale(sampleSz/1024, -sampleSz/1024);
    ofx.translate(-512, -512);
    ofx.fillStyle = '#000';
    try { ofx.fill(new Path2D(strokePath)); } catch(e) {}
    ofx.restore();

  var imgData = ofx.getImageData(0, 0, sampleSz, sampleSz);

  // 2. PRNG
  var hs = holeSeed;
  function hr() { hs=(hs*1664525+1013904223)&0x7fffffff; return hs/0x7fffffff; }

  // 3. Draw ink wash dots — adaptive step keeps total dots ≤ ~8000
  var step = 1; // sampleSz capped at 512 so max ~512*512*keepRate pixels
  var ox = cx - size/2;
  var oy = cy - size/2;

  // If colorPalette provided and color ink is on, pick a hue for this stroke
  var useColor = colorPalette && document.getElementById('tog-color') && document.getElementById('tog-color').checked;
  var inkR=26, inkG=18, inkB=8;
  var m = inkCol.match(/rgb\((\d+),(\d+),(\d+)\)/);
  if (m) { inkR=+m[1]; inkG=+m[2]; inkB=+m[3]; }
  if (useColor && colorPalette.length) {
    // Pick color from palette using holeSeed
    var ci = holeSeed % colorPalette.length;
    var hex = colorPalette[ci].replace('#','');
    inkR=parseInt(hex.slice(0,2),16); inkG=parseInt(hex.slice(2,4),16); inkB=parseInt(hex.slice(4,6),16);
  }

  for (var py = 0; py < sampleSz; py += step) {
    for (var px = 0; px < sampleSz; px += step) {
      var idx = (py * sampleSz + px) * 4;
      if (imgData.data[idx+3] < 60) continue;

      var edgeFactor = imgData.data[idx+3] / 255;

      // Random ink dot properties
      var rnd = hr();
      // depthFocus: near=dense+large, far=sparse+small
      var keepRate = 0.2 + depthFocus * 0.6;   // 0.2 (far/sparse) → 0.8 (near/dense)
      if (rnd > keepRate) continue;

      // Dot radius: near=larger, far=tiny
      var baseR = (0.2 + depthFocus*0.5) + hr()*(0.3 + depthFocus*0.4);
      var r = baseR * (0.6 + edgeFactor*0.4);

      // Blur scatter: far strokes scatter outward from stroke center
      // edgeFactor≈0 means we're near the stroke edge → scatter most
      var blurAmount = (1 - depthFocus) * size * 0.18;
      var edgeScatter = (1 - edgeFactor);
      var scatterR = blurAmount * (edgeScatter * 0.7 + 0.3);
      // Scale sample px/py to real size coords
      var rpx = px * szScale, rpy = py * szScale;
      var dxC = rpx - size/2, dyC = rpy - size/2;
      var distC = Math.sqrt(dxC*dxC + dyC*dyC) || 1;
      var scatterX = (dxC/distC) * scatterR * (0.4 + hr()*0.6);
      var scatterY = (dyC/distC) * scatterR * (0.4 + hr()*0.6);

      var jitter = r * (0.8 + (1-depthFocus)*1.5);
      var jx = scatterX + (hr()-0.5)*jitter;
      var jy = scatterY + (hr()-0.5)*jitter;

      var alpha = (0.3 + depthFocus*0.4 + hr()*0.3) * (0.5 + edgeFactor*0.5);

      var cr = Math.min(255, inkR + Math.round((hr()-0.5)*20));
      var cg = Math.min(255, inkG + Math.round((hr()-0.5)*12));
      var cb = Math.min(255, inkB + Math.round((hr()-0.5)*8));

      ctx.globalAlpha = alpha;
      ctx.fillStyle = 'rgb('+cr+','+cg+','+cb+')';
      ctx.beginPath();
      if (hr() > 0.85) {
        ctx.ellipse(ox+rpx+jx, oy+rpy+jy, r*1.4, r*0.5, hr()*Math.PI, 0, Math.PI*2);
      } else {
        ctx.arc(ox+rpx+jx, oy+rpy+jy, r, 0, Math.PI*2);
      }
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;

  // 4. Edge splatter: ink drops that escaped the stroke boundary
  var nSplat = 6 + Math.floor(hr()*10);
  for (var k=0; k<nSplat; k++) {
    // Find a random edge pixel and shoot out from it
    var ex = hr()*size, ey = hr()*size;
    var angle = hr()*Math.PI*2;
    var dist = size*(0.04 + hr()*0.12);
    var spx = ox + ex + Math.cos(angle)*dist;
    var spy = oy + ey + Math.sin(angle)*dist;
    var spr = 1 + hr()*3;
    ctx.globalAlpha = 0.08 + hr()*0.2;
    ctx.fillStyle = 'rgb('+inkR+','+inkG+','+inkB+')';
    ctx.beginPath(); ctx.arc(spx, spy, spr, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ── Draw poster — ink stamp style ────────────────────────────────────────────
function drawPoster(ch, data, etymInfo, _strokeLimit, _dotAlphaScale) {
  if (animTimer) { clearTimeout(animTimer); animTimer = null; }
  var sc = SCHEMES[currentScheme];
  var W = 720, H = 1020;
  ctx.clearRect(0, 0, W, H);

  // ── Ink color system ────────────────────────────────────────────────────────
  var inkPalettes = {
    parchment: { dark:[26,18,8],    light:[80,50,20]  },
    ink:       { dark:[10,8,4],     light:[40,30,10]  },
    night:     { dark:[192,216,255], light:[96,144,208] },
    minimal:   { dark:[17,17,17],   light:[136,136,136] },
    crimson:   { dark:[255,68,85],  light:[180,20,40]  },
    forest:    { dark:[125,220,138],light:[40,120,55]  },
    dusk:      { dark:[224,170,255],light:[140,80,200] },
    paper:     { dark:[26,42,74],   light:[80,110,160] }
  };
  var ip = inkPalettes[currentScheme] || inkPalettes.parchment;

  function inkColor(t) {
    var r = Math.round(ip.light[0] + (ip.dark[0] - ip.light[0]) * t);
    var g = Math.round(ip.light[1] + (ip.dark[1] - ip.light[1]) * t);
    var b = Math.round(ip.light[2] + (ip.dark[2] - ip.light[2]) * t);
    return 'rgb(' + r + ',' + g + ',' + b + ')';
  }

  // ── Background: rice paper ──────────────────────────────────────────────────
  ctx.fillStyle = sc.bg;
  ctx.fillRect(0, 0, W, H);

  // Grain texture
  var grainSeed = 99991;
  function gr() { grainSeed = (grainSeed * 1664525 + 1013904223) & 0x7fffffff; return grainSeed / 0x7fffffff; }
  ctx.save();
  for (var gi = 0; gi < 1200; gi++) {
    var gx = gr() * W;
    var gy = gr() * H;
    var ga = 0.015 + gr() * 0.035;
    ctx.fillStyle = 'rgba(80,50,20,' + ga + ')';
    ctx.fillRect(gx, gy, 1, 1);
  }
  ctx.restore();

  // Subtle horizontal fiber lines
  ctx.save();
  ctx.strokeStyle = 'rgba(120,80,40,0.035)';
  ctx.lineWidth = 0.5;
  for (var hl = 0; hl < H; hl += 22) {
    ctx.beginPath(); ctx.moveTo(0, hl); ctx.lineTo(W, hl); ctx.stroke();
  }
  ctx.restore();

  // ── Seeded random for stable stroke layout ──────────────────────────────────
  var seed = ch.codePointAt(0);
  function sr() { seed = (seed * 1664525 + 1013904223) & 0x7fffffff; return seed / 0x7fffffff; }

  var strokes = (data && data.strokes) ? data.strokes : [];
  var strokeLimit = (_strokeLimit !== undefined) ? _strokeLimit : strokes.length;
  var alphaScale = (_dotAlphaScale !== undefined) ? _dotAlphaScale : 1.0;
  var N = strokes.length;

  // ── Layout: force-repulsion scatter ────────────────────────────────────────
  // Strokes start random, then repel each other for even natural spread
  var layout = [];
  if (N > 0) {
    var margin = 60;
    var areaW = W - margin*2, areaH = (H-56) - margin*2;
    // Pick one hero stroke — seeded so it's stable per character
    var heroIdx = Math.floor(sr() * N);
    // Init random positions
    for (var li = 0; li < N; li++) {
      var isHero = (li === heroIdx);
      // Hero: 65–85% of canvas short side; others: 30–55%
      var lsz = isHero
        ? Math.round(Math.min(W, H-56) * (3.2 + sr()*1.3))
        : Math.round(Math.min(W, H-56) * (0.55 + sr()*0.55));
      layout.push({
        cx: margin + sr()*areaW,
        cy: margin + sr()*areaH,
        size: lsz,
        depth: 0.3 + sr()*0.7,
        hero: isHero
      });
    }
    // Repulsion iterations — hero has stronger personal space
    var minDist = Math.min(W, H-56) * 0.22;
    for (var iter = 0; iter < 80; iter++) {
      for (var a = 0; a < N; a++) {
        var fx = 0, fy = 0;
        for (var b = 0; b < N; b++) {
          if (a === b) continue;
          var dx = layout[a].cx - layout[b].cx;
          var dy = layout[a].cy - layout[b].cy;
          var dist = Math.sqrt(dx*dx + dy*dy) || 1;
          if (dist < minDist) {
            var force = (minDist - dist) / minDist * 0.5;
            fx += (dx/dist) * force;
            fy += (dy/dist) * force;
          }
        }
        layout[a].cx = Math.max(margin, Math.min(W-margin, layout[a].cx + fx*minDist));
        layout[a].cy = Math.max(margin, Math.min(H-56-margin, layout[a].cy + fy*minDist));
      }
    }
  }

  if (strokes.length > 0) {
    // ── Ink stamp pass ────────────────────────────────────────────────────────
    for (var si = 0; si < strokeLimit; si++) {
      var sl = layout[si];
      var holeSeed = seed + si * 7919;
      // Each stroke gets random depth focus — creates bokeh/depth-of-field feel
      var depthFocus = 0.2 + sr() * 0.8;
      renderInkStroke(ctx, strokes[si], sl.cx, sl.cy, sl.size, inkColor(sl.depth), holeSeed, depthFocus, sc.palette);
    }
  } else {
    // Fallback: font render when no stroke data
    ctx.save();
    ctx.font = '220px "Noto Serif SC", serif';
    ctx.fillStyle = inkColor(0.7);
    ctx.globalAlpha = 0.15;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(ch, W / 2, H / 2);
    ctx.restore();
  }

  // ── Flow lines — 国画山水横向粒子流线 ──────────────────────────────────────
  if (document.getElementById('tog-fog') && document.getElementById('tog-fog').checked) {
    var fogSeed = ch.codePointAt(0) * 999983;
    function fg() { fogSeed=(fogSeed*1664525+1013904223)&0x7fffffff; return fogSeed/0x7fffffff; }
    var fogR=ip.dark[0], fogG=ip.dark[1], fogB=ip.dark[2];

    ctx.save();
    var nLines = 2 + Math.floor(fg()*2); // 2–3 lines
    for (var li=0; li<nLines; li++) {
      // Each line: a bezier path sampled into particles
      var baseY = 30 + fg()*(H-86);
      var nSeg = 4 + Math.floor(fg()*3);
      var segW = (W+40) / nSeg;

      // Build smooth catmull-rom style control points
      // Key: control points inherit velocity from previous segment — no sharp corners
      var pts = [{x:-20, y:baseY}];
      var cy_cur = baseY;
      var vy = (fg()-0.5)*80; // wilder initial velocity
      for (var si3=0; si3<nSeg; si3++) {
        var x0 = -20 + si3*segW;
        vy += (fg()-0.5)*60; // more random drift per segment
        vy *= 0.65; // dampen but keep some momentum
        var endY = cy_cur + vy;
        // Control points follow the flow direction — smooth tangent continuity
        pts.push({
          cp1x: x0+segW*0.33, cp1y: cy_cur + vy*0.33,
          cp2x: x0+segW*0.66, cp2y: endY - vy*0.33,
          x: x0+segW, y: endY
        });
        cy_cur = endY;
      }

      // Sample points along bezier path and draw tiny particles
      var totalPts = 400 + Math.floor(fg()*150); // very dense
      var lineAlpha = 0.15 + fg()*0.15;           // clearly visible
      var dotR = 0.3 + fg()*0.6;

      for (var pi2=0; pi2<totalPts; pi2++) {
        var tGlobal = pi2 / totalPts;
        var segIdx = Math.floor(tGlobal * nSeg);
        var tSeg = (tGlobal * nSeg) - segIdx;
        if (segIdx >= pts.length-1) segIdx = pts.length-2;

        var p0 = pts[segIdx], p1 = pts[segIdx+1];
        var mt = 1-tSeg;
        var bx = mt*mt*mt*p0.x + 3*mt*mt*tSeg*p1.cp1x + 3*mt*tSeg*tSeg*p1.cp2x + tSeg*tSeg*tSeg*p1.x;
        var by = mt*mt*mt*p0.y + 3*mt*mt*tSeg*p1.cp1y + 3*mt*tSeg*tSeg*p1.cp2y + tSeg*tSeg*tSeg*p1.y;

        var edgeFade = Math.sin(tGlobal * Math.PI);
        // Wider scatter with gaussian-like falloff — dense core, soft diffuse edge
        var sc1 = (fg()-0.5)*3;   // tight core
        var sc2 = (fg()-0.5)*10;  // occasional outlier
        var scatter = sc1 + (fg()>0.75 ? sc2 : 0);
        var pAlpha = lineAlpha * edgeFade * (0.45 + fg()*0.55);
        var pr = dotR * (0.4 + fg()*1.0);

        ctx.globalAlpha = pAlpha;
        ctx.fillStyle = 'rgb('+fogR+','+fogG+','+fogB+')';
        ctx.beginPath();
        ctx.arc(bx + (fg()-0.5)*2, by + scatter, pr, 0, Math.PI*2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // ── Bottom strip ─────────────────────────────────────────────────────────────
  var stripH = 56;
  var stripY = H - stripH;
  // Strip background: semi-transparent ink color
  ctx.save();
  ctx.fillStyle = inkColor(0.95);
  ctx.globalAlpha = 0.88;
  ctx.fillRect(0, stripY, W, stripH);
  ctx.restore();

  // Large character ghost — left side of strip
  ctx.save();
  ctx.font = 'bold 38px "Noto Serif SC", serif';
  ctx.fillStyle = sc.bg;
  ctx.globalAlpha = 0.9;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(ch, 20, stripY + stripH/2);
  ctx.restore();

  // Pinyin + meaning — middle
  ctx.save();
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  var midX = 80;
  if (etymInfo && etymInfo.pinyin) {
    ctx.font = '500 13px Outfit, sans-serif';
    ctx.fillStyle = sc.bg;
    ctx.globalAlpha = 0.85;
    ctx.fillText(etymInfo.pinyin, midX, stripY + 16);
  }
  if (etymInfo && etymInfo.meaning) {
    ctx.font = '300 10px Outfit, "Noto Sans SC", sans-serif';
    ctx.fillStyle = sc.bg;
    ctx.globalAlpha = 0.55;
    var meaning = etymInfo.meaning.length > 32 ? etymInfo.meaning.slice(0,30)+'…' : etymInfo.meaning;
    ctx.fillText(meaning, midX, stripY + 32);
  }
  ctx.restore();

  // Right side: stroke count + radical info
  ctx.save();
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  var strokeCount = (data && data.strokes) ? data.strokes.length : (etymInfo && etymInfo.strokes ? etymInfo.strokes : 0);
  if (strokeCount) {
    ctx.font = '500 11px Outfit, sans-serif';
    ctx.fillStyle = sc.bg;
    ctx.globalAlpha = 0.55;
    ctx.fillText(strokeCount + ' strokes', W - 16, stripY + 16);
  }
  // "Glyph It" brand
  ctx.font = '300 9px Outfit, sans-serif';
  ctx.fillStyle = sc.bg;
  ctx.globalAlpha = 0.3;
  ctx.textBaseline = 'bottom';
  ctx.fillText('Glyph It', W - 16, H - 8);
  ctx.restore();
}

// ── Animate strokes — reveal one by one with dot fade-in ─────────────────────
function animatePoster(ch, data, etymInfo) {
  if (!data || !data.strokes || data.strokes.length === 0) {
    drawPoster(ch, data, etymInfo);
    return;
  }
  var total = data.strokes.length;
  var W = 720, H = 1020;
  var sc2 = SCHEMES[currentScheme];

  // Pre-compute layout — force-repulsion (same seed as drawPoster)
  var seed2 = ch.codePointAt(0);
  function sr2() { seed2=(seed2*1664525+1013904223)&0x7fffffff; return seed2/0x7fffffff; }
  var N = total;
  var margin2=60, areaW2=W-margin2*2, areaH2=(H-56)-margin2*2;
  // MUST match drawPoster exactly — heroIdx consumes one sr() first
  var heroIdx2 = Math.floor(sr2()*N);
  var preLayout = [];
  for (var li2=0; li2<N; li2++) {
    var isHero2=(li2===heroIdx2);
    var lsz2=isHero2
      ? Math.round(Math.min(W,H-56)*(3.2+sr2()*1.3))
      : Math.round(Math.min(W,H-56)*(0.55+sr2()*0.55));
    preLayout.push({cx:margin2+sr2()*areaW2, cy:margin2+sr2()*areaH2, size:lsz2, depth:0.3+sr2()*0.7});
  }
  var minDist2=Math.min(W,H-56)*0.22;
  for (var iter2=0;iter2<80;iter2++){
    for(var a2=0;a2<N;a2++){
      var fx2=0,fy2=0;
      for(var b2=0;b2<N;b2++){
        if(a2===b2) continue;
        var dx2=preLayout[a2].cx-preLayout[b2].cx, dy2=preLayout[a2].cy-preLayout[b2].cy;
        var dist2=Math.sqrt(dx2*dx2+dy2*dy2)||1;
        if(dist2<minDist2){var f2=(minDist2-dist2)/minDist2*0.5;fx2+=(dx2/dist2)*f2;fy2+=(dy2/dist2)*f2;}
      }
      preLayout[a2].cx=Math.max(margin2,Math.min(W-margin2,preLayout[a2].cx+fx2*minDist2));
      preLayout[a2].cy=Math.max(margin2,Math.min(H-56-margin2,preLayout[a2].cy+fy2*minDist2));
    }
  }
  // depthFocus is drawn from same seed sequence in drawPoster's render loop
  // consume same sr() calls: in drawPoster, depthFocus = 0.2 + sr()*0.8 per stroke
  var preFocus = [];
  for (var fi=0; fi<N; fi++) { preFocus.push(0.2+sr2()*0.8); }

  var ip2={parchment:{dark:[26,18,8],light:[80,50,20]},ink:{dark:[10,8,4],light:[40,30,10]},night:{dark:[192,216,255],light:[96,144,208]},minimal:{dark:[17,17,17],light:[136,136,136]},crimson:{dark:[255,68,85],light:[180,20,40]},forest:{dark:[125,220,138],light:[40,120,55]},dusk:{dark:[224,170,255],light:[140,80,200]},paper:{dark:[26,42,74],light:[80,110,160]}}[currentScheme]||{dark:[26,18,8],light:[80,50,20]};
  function inkColor2(t){return 'rgb('+Math.round(ip2.light[0]+(ip2.dark[0]-ip2.light[0])*t)+','+Math.round(ip2.light[1]+(ip2.dark[1]-ip2.light[1])*t)+','+Math.round(ip2.light[2]+(ip2.dark[2]-ip2.light[2])*t)+')';}

  function drawBg() {
    ctx.fillStyle=sc2.bg; ctx.fillRect(0,0,W,H);
    var gs=99991; function gr2(){gs=(gs*1664525+1013904223)&0x7fffffff;return gs/0x7fffffff;}
    for(var gi=0;gi<1200;gi++){ctx.fillStyle='rgba(80,50,20,'+(0.015+gr2()*0.035)+')';ctx.fillRect(gr2()*W,gr2()*H,1,1);}
  }

  function drawOverlay() {
    var stripH=56, stripY=H-stripH, sc3=SCHEMES[currentScheme];
    ctx.save(); ctx.fillStyle=inkColor2(0.95); ctx.globalAlpha=0.88; ctx.fillRect(0,stripY,W,stripH); ctx.restore();
    ctx.save(); ctx.font='bold 38px "Noto Serif SC",serif'; ctx.fillStyle=sc3.bg; ctx.globalAlpha=0.9; ctx.textAlign='left'; ctx.textBaseline='middle'; ctx.fillText(ch,20,stripY+stripH/2); ctx.restore();
    if(etymInfo&&etymInfo.pinyin){ctx.save();ctx.font='500 13px Outfit,sans-serif';ctx.fillStyle=sc3.bg;ctx.globalAlpha=0.85;ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(etymInfo.pinyin,80,stripY+16);ctx.restore();}
    if(etymInfo&&etymInfo.meaning){ctx.save();ctx.font='300 10px Outfit,"Noto Sans SC",sans-serif';ctx.fillStyle=sc3.bg;ctx.globalAlpha=0.55;ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(etymInfo.meaning.slice(0,30),80,stripY+32);ctx.restore();}
    var sc2n=data?data.strokes.length:0; if(sc2n){ctx.save();ctx.font='500 11px Outfit,sans-serif';ctx.fillStyle=sc3.bg;ctx.globalAlpha=0.55;ctx.textAlign='right';ctx.textBaseline='middle';ctx.fillText(sc2n+' strokes',W-16,stripY+16);ctx.restore();}
    ctx.save();ctx.font='300 9px Outfit,sans-serif';ctx.fillStyle=sc3.bg;ctx.globalAlpha=0.3;ctx.textAlign='right';ctx.textBaseline='bottom';ctx.fillText('Glyph It',W-16,H-8);ctx.restore();
  }

  // ── Pre-sample all stroke pixels once ──────────────────────────────────────
  // Each stroke: array of {tx,ty,r,al,cr,cg,cb} — target positions
  var strokeDots = [];
  for (var si2=0; si2<total; si2++) {
    var sl2=preLayout[si2];
    var focus2=preFocus[si2];
    // Cap sample canvas at 512px max — hero strokes are huge but we don't need all pixels
    var isHero2=(si2===heroIdx2);
    var sampleSize = Math.min(sl2.size, 512);
    var sizeScale = sl2.size / sampleSize;
    var ofc2=document.createElement('canvas');
    ofc2.width=sampleSize; ofc2.height=sampleSize;
    var ofx2=ofc2.getContext('2d');
    ofx2.save(); ofx2.translate(sampleSize/2,sampleSize/2);
    ofx2.scale(sampleSize/1024,-sampleSize/1024);
    ofx2.translate(-512,-512);
    ofx2.fillStyle='#000';
    try{ofx2.fill(new Path2D(data.strokes[si2]));}catch(e){}
    ofx2.restore();
    var imd=ofx2.getImageData(0,0,sampleSize,sampleSize);
    var hs3=seed2+si2*7919; function hr3(){hs3=(hs3*1664525+1013904223)&0x7fffffff;return hs3/0x7fffffff;}
    var dots=[];
    // Adaptive step: keep total dots ≤ 8000 per stroke regardless of size
    // skipRate=1: full density (sampleSize already capped at 512, so max ~512*512*keepRate dots)
    var skipRate = 1;
    var blurAmt2=(1-focus2)*sl2.size*0.18;
    // Color ink: per-stroke hue from palette if toggle is on
    var useColor2 = document.getElementById('tog-color') && document.getElementById('tog-color').checked;
    var sc2pal = SCHEMES[currentScheme].palette || [];
    var ip2base = ip2.dark;
    if (useColor2 && sc2pal.length) {
      var ci2 = (seed2 + si2*7919) % sc2pal.length;
      var hex2 = sc2pal[ci2].replace('#','');
      ip2base = [parseInt(hex2.slice(0,2),16), parseInt(hex2.slice(2,4),16), parseInt(hex2.slice(4,6),16)];
    }
    var ip2r=ip2base[0], ip2g=ip2base[1], ip2b=ip2base[2];
    // Hero gets higher keep rate for denser dots
    var keepR2 = isHero2 ? (0.5 + focus2*0.45) : (0.2 + focus2*0.55);
    var ox2=sl2.cx-sl2.size/2, oy2=sl2.cy-sl2.size/2;
    for(var py2=0;py2<sampleSize;py2+=skipRate){
      for(var px3=0;px3<sampleSize;px3+=skipRate){
        var pidx2=(py2*sampleSize+px3)*4;
        if(imd.data[pidx2+3]<60) continue;
        if(hr3()>keepR2) continue;
        var ef2=imd.data[pidx2+3]/255;
        var br2=(0.2+focus2*0.5)+hr3()*(0.3+focus2*0.4);
        var rr2=br2*(0.6+ef2*0.4)*Math.max(1,sizeScale*0.5); // scale dot size with stroke
        var esc2=1-ef2;
        var scR2=blurAmt2*(esc2*0.7+0.3);
        // Scale sample coords back to real stroke size
        var realPx=px3*sizeScale, realPy=py2*sizeScale;
        var dxC2=realPx-sl2.size/2,dyC2=realPy-sl2.size/2;
        var dc2=Math.sqrt(dxC2*dxC2+dyC2*dyC2)||1;
        var scX2=(dxC2/dc2)*scR2*(0.4+hr3()*0.6);
        var scY2=(dyC2/dc2)*scR2*(0.4+hr3()*0.6);
        var jit2=rr2*(0.8+(1-focus2)*1.5);
        var startAngle = hr3()*Math.PI*2;
        var startDist = Math.sqrt(hr3()) * Math.min(W,H-56)*0.4;
        dots.push({
          tx: ox2+realPx+scX2+(hr3()-0.5)*jit2,
          ty: oy2+realPy+scY2+(hr3()-0.5)*jit2,
          sx: W*0.5 + Math.cos(startAngle)*startDist,
          sy: (H-56)*0.5 + Math.sin(startAngle)*startDist,
          r:  rr2,
          al: (0.3+focus2*0.4+hr3()*0.3)*(0.5+ef2*0.5),
          cr: Math.min(255,ip2r+Math.round((hr3()-0.5)*20)),
          cg: Math.min(255,ip2g+Math.round((hr3()-0.5)*12)),
          cb: Math.min(255,ip2b+Math.round((hr3()-0.5)*8)),
          elong: hr3()>0.85, angle: hr3()*Math.PI,
          wx: (hr3()-0.5)*W*0.15,
          wy: (hr3()-0.5)*(H-56)*0.10,
          phase: hr3()*0.35
        });
      }
    }
    strokeDots.push(dots);
  }

  // ── Settled canvas: cache completed strokes so we don't redraw all dots every frame ──
  var settledCanvas = document.createElement('canvas');
  settledCanvas.width = W; settledCanvas.height = H;
  var settledCtx = settledCanvas.getContext('2d');

  function drawStrokeDots(targetCtx, si3, t) {
    var dots=strokeDots[si3];
    var et = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
    var spring = t > 0.85 ? 1 + Math.sin((t-0.85)/0.15*Math.PI)*0.03 : 1;
    for(var di=0;di<dots.length;di++){
      var d=dots[di];
      var tp = Math.max(0, t - d.phase);
      var windEnv = Math.sin(Math.min(tp,1)*Math.PI);
      var curX = (d.sx + (d.tx - d.sx)*et*spring) + d.wx*windEnv*0.5;
      var curY = (d.sy + (d.ty - d.sy)*et*spring) + d.wy*windEnv*0.5;
      targetCtx.globalAlpha = d.al * Math.min(t*5,1);
      targetCtx.fillStyle='rgb('+d.cr+','+d.cg+','+d.cb+')';
      targetCtx.beginPath();
      if(d.elong){targetCtx.ellipse(curX,curY,d.r*1.4,d.r*0.5,d.angle,0,Math.PI*2);}
      else{targetCtx.arc(curX,curY,d.r,0,Math.PI*2);}
      targetCtx.fill();
    }
    targetCtx.globalAlpha=1;
  }

  function settleStroke(si3) {
    // Bake finished stroke onto settledCanvas at t=1
    drawStrokeDots(settledCtx, si3, 1.0);
  }

  // All strokes launch simultaneously with random delay + duration
  var strokeStates = [];
  var sr3seed = seed2 + 9999;
  function sr3(){sr3seed=(sr3seed*1664525+1013904223)&0x7fffffff;return sr3seed/0x7fffffff;}
  for (var ki=0; ki<total; ki++) {
    strokeStates.push({
      startTime: null,
      delay: sr3() * 600,
      dur:   800 + sr3() * 500,
      settled: false
    });
  }
  var allDone = false;

  function allGatherFrame(ts) {
    if (allDone) return;
    // Composite: bg + settled cache + active strokes
    drawBg();
    ctx.drawImage(settledCanvas, 0, 0); // paste already-settled strokes (fast)

    var finishedCount = 0;
    for (var ai=0; ai<total; ai++) {
      var st = strokeStates[ai];
      if (st.startTime === null) st.startTime = ts;
      var elapsed = ts - st.startTime - st.delay;
      if (elapsed < 0) { continue; }
      var t = Math.min(elapsed / st.dur, 1);

      if (t >= 1) {
        if (!st.settled) {
          st.settled = true;
          settleStroke(ai); // bake into settled canvas once
        }
        finishedCount++;
      } else {
        drawStrokeDots(ctx, ai, t); // only draw animating strokes live
      }
    }

    drawOverlay();

    if (finishedCount >= total) {
      allDone = true;
      drawPoster(ch, data, etymInfo);
      return;
    }
    animTimer = requestAnimationFrame(allGatherFrame);
  }

  drawBg(); drawOverlay();
  animTimer = requestAnimationFrame(allGatherFrame);
}

// ── Wrap text helper ──────────────────────────────────────────────────────────
function wrapText(ctx, text, x, y, maxWidth, lineH) {
  var words = text.split('');
  var line = '';
  var lineY = y;
  for (var i = 0; i < words.length; i++) {
    var testLine = line + words[i];
    var metrics = ctx.measureText(testLine);
    if (metrics.width > maxWidth && line.length > 0) {
      ctx.fillText(line, x, lineY);
      line = words[i];
      lineY += lineH;
    } else {
      line = testLine;
    }
  }
  if (line) ctx.fillText(line, x, lineY);
}

// ── Export ────────────────────────────────────────────────────────────────────
function exportPNG() {
  var ch = charInput.value.trim() || 'glyph';
  var link = document.createElement('a');
  link.download = 'glyph-' + ch + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}
document.getElementById('btn-export-hdr').addEventListener('click', exportPNG);
document.getElementById('btn-export-panel').addEventListener('click', exportPNG);

// ── Initial render ────────────────────────────────────────────────────────────
(function() {
  var initChar = '字';
  charInput.value = initChar;
  setStatus('Loading...');
  fetchGlyph(initChar, function(data) {
    setStatus('');
    drawPoster(initChar, data, ETYM[initChar] || null);
  });
})();

})();
</script>
