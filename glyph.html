<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Glyph It &#8212; Chinese Character Poster</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f0ece4;--panel-bg:#fff;--border:#e0d8cc;--text:#1a1a1a;--muted:#888;--accent:#8b4513;--header-bg:#fff;--header-h:44px}
[data-theme="dark"]{--bg:#141414;--panel-bg:#1e1e1e;--border:#2a2a2a;--text:#f0f0f0;--muted:#666;--accent:#c8941a;--header-bg:#0e0e0e}
html,body{height:100%;overflow:hidden}
body{font-family:'Outfit','Noto Serif SC',sans-serif;font-size:13px;background:var(--bg);color:var(--text);display:flex;flex-direction:column}
header{height:var(--header-h);background:var(--header-bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;z-index:100}
.brand{font-size:16px;font-weight:500;font-family:'Outfit',sans-serif}
.brand-it{color:var(--accent)}
.header-spacer{flex:1}
.btn-icon{background:none;border:1px solid var(--border);color:var(--text);border-radius:6px;height:28px;cursor:pointer;font-family:inherit;font-size:12px;padding:0 10px;transition:all .15s}
.btn-icon:hover{border-color:var(--accent);color:var(--accent)}
#app{display:flex;flex:1;min-height:0}
#panel{width:300px;flex-shrink:0;background:var(--panel-bg);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.panel-section{padding:14px 16px;border-bottom:1px solid var(--border)}
.section-title{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.btn{background:none;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 10px;font-family:inherit;font-size:12px;cursor:pointer;transition:all .15s}
.btn:hover,.btn.active{border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--accent);border:none;color:#fff;border-radius:6px;padding:9px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;width:100%;margin-top:10px;transition:opacity .15s}
.btn-primary:hover{opacity:.85}
.char-input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px;font-family:'Noto Serif SC',serif;font-size:36px;text-align:center;outline:none;transition:border-color .15s}
.char-input:focus{border-color:var(--accent)}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.chip{background:none;border:1px solid var(--border);color:var(--text);border-radius:5px;padding:3px 8px;font-family:'Noto Serif SC',serif;font-size:16px;cursor:pointer;transition:all .15s}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.btn-group{display:flex;gap:4px;flex-wrap:wrap}
.btn-group .btn{font-size:11px;padding:4px 10px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-size:12px}
.toggle-switch{position:relative;width:32px;height:18px;cursor:pointer;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;background:var(--border);border-radius:9px;transition:background .2s}
.toggle-switch input:checked+.toggle-track{background:var(--accent)}
.toggle-knob{position:absolute;top:2px;left:2px;width:14px;height:14px;background:#fff;border-radius:50%;transition:transform .2s;pointer-events:none;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle-switch input:checked~.toggle-knob{transform:translateX(14px)}
#panel-export{padding:14px 16px;margin-top:auto;border-top:1px solid var(--border)}
#status{font-size:11px;color:var(--muted);min-height:14px;margin-top:6px}
#canvas-area{flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg);overflow:hidden}
#glyph-canvas{border-radius:4px;box-shadow:0 4px 32px rgba(0,0,0,.15)}
@media(max-width:700px){
  #app{flex-direction:column}
  #panel{width:100%;height:auto;max-height:52vh;border-right:none;border-top:1px solid var(--border);order:2;overflow-y:auto}
  #canvas-area{flex:1;order:1}
}
</style>
</head>
<body>
<header>
  <div class="brand">Glyph<span class="brand-it">It</span></div>
  <div class="header-spacer"></div>
  <button class="btn-icon" id="btn-export-hdr">&#8595; PNG</button>
  <button class="btn-icon" id="btn-theme">&#9789;</button>
</header>
<div id="app">
  <div id="panel">
    <div class="panel-section">
      <div class="section-title">Character</div>
      <input class="char-input" id="char-input" maxlength="1" placeholder="&#23383;" autocomplete="off" spellcheck="false"/>
      <div class="chips" id="preset-chips"></div>
      <button class="btn-primary" id="btn-generate">Generate Poster</button>
    </div>
    <div class="panel-section">
      <div class="section-title">Style</div>
      <div class="btn-group" id="scheme-group">
        <button class="btn active" data-scheme="parchment">Parchment</button>
        <button class="btn" data-scheme="ink">Ink</button>
        <button class="btn" data-scheme="night">Night</button>
        <button class="btn" data-scheme="minimal">Minimal</button>
      </div>
    </div>
    <div class="panel-section">
      <div class="section-title">Font</div>
      <div class="btn-group" id="font-group">
        <button class="btn active" data-font="stroke">楷书 (Stroke)</button>
        <button class="btn" data-font="serif">宋体 Serif</button>
        <button class="btn" data-font="sans">黑体 Sans</button>
        <button class="btn" data-font="traditional">繁体 Trad</button>
      </div>
    </div>
    <div class="panel-section">
      <div class="section-title">Display</div>
      <div class="toggle-row">
        <span>Show stroke order</span>
        <label class="toggle-switch"><input type="checkbox" id="tog-strokes" checked/><div class="toggle-track"></div><div class="toggle-knob"></div></label>
      </div>
      <div class="toggle-row">
        <span>Show etymology</span>
        <label class="toggle-switch"><input type="checkbox" id="tog-etym" checked/><div class="toggle-track"></div><div class="toggle-knob"></div></label>
      </div>
      <div class="toggle-row">
        <span>Animate strokes</span>
        <label class="toggle-switch"><input type="checkbox" id="tog-anim"/><div class="toggle-track"></div><div class="toggle-knob"></div></label>
      </div>
    </div>
    <div id="panel-export">
      <div class="section-title">Export</div>
      <button class="btn-primary" id="btn-export-panel">&#8595; Download PNG</button>
      <div id="status"></div>
    </div>
  </div>
  <div id="canvas-area">
    <canvas id="glyph-canvas" width="520" height="680"></canvas>
  </div>
</div>
<script>
(function(){
'use strict';

// Color Schemes
var SCHEMES = {
  parchment: { bg:'#f5efe0', ink:'#2a1a0e', accent:'#8b4513', muted:'#b89870', ruled:'rgba(139,69,19,0.06)', watermark:'rgba(139,69,19,0.04)', badge:'#8b4513', badgeText:'#f5efe0', palette:['#2a1a0e','#8b4513','#4a6741','#1a3a5c','#5c3a6b','#6b4a1a','#2a4a4a','#5c4a2a'] },
  ink:       { bg:'#f5c800', ink:'#1a1208', accent:'#1a1208', muted:'#7a6010', ruled:'rgba(0,0,0,0.06)', watermark:'rgba(0,0,0,0.04)', badge:'#1a1208', badgeText:'#f5c800', palette:['#1a1208','#2a2010','#0a0a08','#1a1008','#221808','#181208','#100e06','#201808'] },
  night:     { bg:'#0d0d1a', ink:'#a0e0ff', accent:'#00ffcc', muted:'#406080', ruled:'rgba(0,255,204,0.04)', watermark:'rgba(0,255,204,0.03)', badge:'#00ffcc', badgeText:'#0d0d1a', palette:['#a0e0ff','#00ffcc','#ff80c0','#80ffaa','#c0a0ff','#ffcc40','#40e0d0','#ff8040'] },
  minimal:   { bg:'#ffffff', ink:'#111111', accent:'#333333', muted:'#aaaaaa', ruled:'rgba(0,0,0,0.04)', watermark:'rgba(0,0,0,0.03)', badge:'#333333', badgeText:'#ffffff', palette:['#111111','#333333','#555555','#222222','#444444','#666666','#1a1a1a','#2a2a2a'] }
};

var ETYM = {
  '山':{ radical:'山', strokes:3, pinyin:'shān', meaning:'山岳 / mountain', etymology:'象形字，像三座山峰并列的形状，中间高、两侧低。甲骨文已有此形。', oracle:true },
  '水':{ radical:'水', strokes:4, pinyin:'shuǐ', meaning:'水流 / water', etymology:'象形字，像河流蜿蜒流动的样子，中间为主流，两侧为支流。', oracle:true },
  '火':{ radical:'火', strokes:4, pinyin:'huǒ', meaning:'火焰 / fire', etymology:'象形字，像火焰燃烧的形状，上部为跳动的火苗，下部为燃烧点。', oracle:true },
  '木':{ radical:'木', strokes:4, pinyin:'mù', meaning:'树木 / wood', etymology:'象形字，像一棵树的形状，上为枝叶，下为根系，中间为树干。', oracle:true },
  '日':{ radical:'日', strokes:4, pinyin:'rì', meaning:'太阳 / sun', etymology:'象形字，甲骨文作圆形中有一点，表示太阳及其光芒，后演变为方形。', oracle:true },
  '月':{ radical:'月', strokes:4, pinyin:'yuè', meaning:'月亮 / moon', etymology:'象形字，像月牙形状，甲骨文呈弯月形，中有一横表示月中之影。', oracle:true },
  '土':{ radical:'土', strokes:3, pinyin:'tǔ', meaning:'土地 / earth', etymology:'象形字，像地面上堆起的土堆形状，下横为地，上横为土堆。', oracle:true },
  '金':{ radical:'金', strokes:8, pinyin:'jīn', meaning:'金属 / gold', etymology:'象形兼会意字，像地下埋藏金属矿石的形状，四点表示金属碎片或光泽。', oracle:false },
  '人':{ radical:'人', strokes:2, pinyin:'rén', meaning:'人类 / person', etymology:'象形字，像人侧身站立的形状，甲骨文即为简单的侧面人形。', oracle:true },
  '口':{ radical:'口', strokes:3, pinyin:'kǒu', meaning:'嘴巴 / mouth', etymology:'象形字，像人张开嘴的形状，甲骨文作方形或圆形，表示口腔。', oracle:true },
  '手':{ radical:'手', strokes:4, pinyin:'shǒu', meaning:'手 / hand', etymology:'象形字，像张开的手掌及五指形状，甲骨文清晰可见手指轮廓。', oracle:true },
  '心':{ radical:'心', strokes:4, pinyin:'xīn', meaning:'心脏 / heart', etymology:'象形字，像心脏的形状，甲骨文有心室轮廓，后简化为现在写法。', oracle:true },
  '目':{ radical:'目', strokes:5, pinyin:'mù', meaning:'眼睛 / eye', etymology:'象形字，像人眼的形状，甲骨文作竖置的椭圆形中有一横，表示眼球与瞳孔。', oracle:true },
  '耳':{ radical:'耳', strokes:6, pinyin:'ěr', meaning:'耳朵 / ear', etymology:'象形字，像人耳的轮廓，甲骨文清晰呈现耳廓与耳道的形状。', oracle:true },
  '足':{ radical:'足', strokes:7, pinyin:'zú', meaning:'脚 / foot', etymology:'会意字，上为"口"（膝盖），下为止（脚趾），合表脚和腿部。', oracle:true },
  '刀':{ radical:'刀', strokes:2, pinyin:'dāo', meaning:'刀具 / knife', etymology:'象形字，像弯曲的刀形，甲骨文呈一弯一直的刀具形状。', oracle:true },
  '弓':{ radical:'弓', strokes:3, pinyin:'gōng', meaning:'弓箭 / bow', etymology:'象形字，像弓的形状，甲骨文已有此形，表示弯曲的弓身。', oracle:true },
  '矢':{ radical:'矢', strokes:5, pinyin:'shǐ', meaning:'箭 / arrow', etymology:'象形字，像箭的形状，上为箭头，下为箭羽，中为箭杆。', oracle:true },
  '石':{ radical:'石', strokes:5, pinyin:'shí', meaning:'石头 / stone', etymology:'象形字，像山崖下的石块形状，上为山崖，下为落石。', oracle:true },
  '田':{ radical:'田', strokes:5, pinyin:'tián', meaning:'田地 / field', etymology:'象形字，像农田被分割成小块的形状，纵横线表示田间阡陌。', oracle:true },
  '力':{ radical:'力', strokes:2, pinyin:'lì', meaning:'力量 / strength', etymology:'象形字，像肌肉用力时鼓起的形状，或说像耕地农具犁的侧面形状。', oracle:true },
  '又':{ radical:'又', strokes:2, pinyin:'yòu', meaning:'右手 / right hand', etymology:'象形字，像右手的形状，甲骨文清晰呈现三指弯曲的右手侧面。', oracle:true },
  '女':{ radical:'女', strokes:3, pinyin:'nǚ', meaning:'女性 / woman', etymology:'象形字，像女子跪坐交手的形状，甲骨文表现古代女子端坐的姿态。', oracle:true },
  '子':{ radical:'子', strokes:3, pinyin:'zǐ', meaning:'孩子 / child', etymology:'象形字，像婴孩的形状，头大体小，手臂伸开，甲骨文即有此形。', oracle:true },
  '马':{ radical:'马', strokes:3, pinyin:'mǎ', meaning:'马 / horse', etymology:'象形字，甲骨文像马的侧面形状，可见鬃毛、四蹄，后经简化演变为现形。', oracle:true },
  '牛':{ radical:'牛', strokes:4, pinyin:'niú', meaning:'牛 / ox', etymology:'象形字，像牛头正面形状，上为两角，中为头部，下为鼻面。', oracle:true },
  '羊':{ radical:'羊', strokes:6, pinyin:'yáng', meaning:'羊 / sheep', etymology:'象形字，像羊头正面形状，上为两弯角，下为颜面，甲骨文形态清晰。', oracle:true },
  '鱼':{ radical:'鱼', strokes:8, pinyin:'yú', meaning:'鱼 / fish', etymology:'象形字，像鱼的侧面轮廓，有头、身、鳍、尾各部，甲骨文已有较完整的鱼形。', oracle:true },
  '鸟':{ radical:'鸟', strokes:5, pinyin:'niǎo', meaning:'鸟 / bird', etymology:'象形字，像鸟的侧面形状，有喙、翅、爪等特征，甲骨文已有较写实的鸟形。', oracle:true },
  '虫':{ radical:'虫', strokes:6, pinyin:'chóng', meaning:'虫子 / insect', etymology:'象形字，本为蛇形，甲骨文像蛇的盘曲形状，后引申泛指各类爬行动物和昆虫。', oracle:true },
  '明':{ radical:'日', strokes:8, pinyin:'míng', meaning:'明亮 / bright', etymology:'会意字，由"日"和"月"组成，日月同辉，表示光明、明亮之意。', oracle:true },
  '森':{ radical:'木', strokes:12, pinyin:'sēn', meaning:'森林 / forest', etymology:'会意字，三个"木"字叠加，表示树木繁多、郁郁葱葱的大森林。', oracle:false },
  '林':{ radical:'木', strokes:8, pinyin:'lín', meaning:'树林 / grove', etymology:'会意字，两个"木"字并列，表示树木丛生的树林。', oracle:false },
  '淼':{ radical:'水', strokes:12, pinyin:'miǎo', meaning:'水势广大 / vast water', etymology:'会意字，三个"水"字叠加，形容水域宽广、烟波浩渺的景象。', oracle:false },
  '焱':{ radical:'火', strokes:12, pinyin:'yàn', meaning:'火花 / flames', etymology:'会意字，三个"火"字叠加，表示火焰跳动、光焰明亮的样子。', oracle:false },
  '鑫':{ radical:'金', strokes:24, pinyin:'xīn', meaning:'财富兴旺 / prosperity', etymology:'会意字，三个"金"字叠加，象征财富积累、兴旺发达，常用于人名店名。', oracle:false },
  '品':{ radical:'口', strokes:9, pinyin:'pǐn', meaning:'品质 / quality', etymology:'会意字，三个"口"字叠加，本义为众多，引申为品类、品质、品格等义。', oracle:false },
  '晶':{ radical:'日', strokes:12, pinyin:'jīng', meaning:'晶莹 / crystal', etymology:'会意字，三个"日"字叠加，形容光亮闪烁、晶莹透明如星光的样子。', oracle:false },
  '众':{ radical:'人', strokes:6, pinyin:'zhòng', meaning:'众多 / multitude', etymology:'会意字，三个"人"字叠加，表示人数众多，引申为大众、群众之意。', oracle:false },
  '炎':{ radical:'火', strokes:8, pinyin:'yán', meaning:'炎热 / scorching', etymology:'会意字，两个"火"字叠加，上火下火表示火势旺盛、极度炎热。', oracle:true },
  '道':{ radical:'辶', strokes:12, pinyin:'dào', meaning:'道路 / way/tao', etymology:'会意兼形声字，由"辶"（行走）和"首"（头，引导）组成，本义为道路，引申为方法、规律、哲学概念。', oracle:false },
  '德':{ radical:'彳', strokes:15, pinyin:'dé', meaning:'道德 / virtue', etymology:'会意字，从"彳"（行走）、"直"（正直）、"心"（内心），表示心正行直的品德。', oracle:false },
  '美':{ radical:'羊', strokes:9, pinyin:'měi', meaning:'美丽 / beauty', etymology:'会意字，从"羊"从"大"，羊大为美，古人以肥美的羊为美好事物的象征。', oracle:true },
  '善':{ radical:'羊', strokes:12, pinyin:'shàn', meaning:'善良 / goodness', etymology:'会意字，从"羊"从"言"，羊象征吉祥温顺，言表表达，合为说话温顺善良之意。', oracle:true },
  '爱':{ radical:'心', strokes:10, pinyin:'ài', meaning:'爱 / love', etymology:'会意字，繁体"愛"从"心"从"受"，以心接受，表示爱护、喜爱之情。', oracle:false },
  '天':{ radical:'大', strokes:4, pinyin:'tiān', meaning:'天空 / sky/heaven', etymology:'会意字，在"大"（人形）的头部加一横，指示头顶上方的天空，引申为天空、自然。', oracle:true },
  '地':{ radical:'土', strokes:6, pinyin:'dì', meaning:'大地 / earth/ground', etymology:'形声字，从"土"表意，"也"表声，本义为大地、土地，与"天"相对。', oracle:false },
  '风':{ radical:'风', strokes:4, pinyin:'fēng', meaning:'风 / wind', etymology:'形声兼象形字，甲骨文像凤鸟形，后借用表示风，加"虫"旁。', oracle:true },
  '雨':{ radical:'雨', strokes:8, pinyin:'yǔ', meaning:'雨水 / rain', etymology:'象形字，像天空中降落雨滴的形状，上横为天，下点为雨滴。', oracle:true },
  '云':{ radical:'云', strokes:4, pinyin:'yún', meaning:'云彩 / cloud', etymology:'象形字，甲骨文像云朵卷曲的形状，后来加"雨"头成"雲"，简化后恢复古形。', oracle:true },
  '中':{ radical:'丨', strokes:4, pinyin:'zhōng', meaning:'中间 / middle', etymology:'象形字，像旗杆或箭矢穿过中心的形状，表示正中、居中之意。', oracle:true },
  '大':{ radical:'大', strokes:3, pinyin:'dà', meaning:'大 / big', etymology:'象形字，像人张开双臂双腿站立的正面形象，表示宏大、高大。', oracle:true },
  '小':{ radical:'小', strokes:3, pinyin:'xiǎo', meaning:'小 / small', etymology:'象形字，像细小沙粒或微小事物的形状，表示微小之意，与"大"相对。', oracle:true },
  '龙':{ radical:'龙', strokes:5, pinyin:'lóng', meaning:'龙 / dragon', etymology:'象形字，甲骨文像一条张牙舞爪的巨龙形象，是中华文化中最重要的神兽符号。', oracle:true },
};


// IDS Decomposition
var IDS = {
  '明':['日','月'], '森':['木','木','木'], '淼':['水','水','水'],
  '焱':['火','火','火'], '品':['口','口','口'], '晶':['日','日','日'],
  '众':['人','人','人'], '林':['木','木'], '炎':['火','火'],
  '双':['又','又'], '从':['人','人'], '好':['女','子'],
  '鸣':['口','鸟'], '鲜':['鱼','羊'], '美':['羊','大'],
  '善':['羊','言']
};

// Preset chips
var PRESETS = ['山','水','火','木','日','月','人','心','道','美','爱','明','森','炎'];

// State
var currentScheme = 'parchment';
var currentFont = 'stroke'; // stroke | serif | sans | traditional
var glyphCache = {};
var animTimer = null;

// Font definitions for canvas rendering
var FONTS = {
  stroke:      null, // uses hanzi-writer stroke data
  serif:       '"Noto Serif SC", "SimSun", serif',
  sans:        '"Noto Sans SC", "SimHei", sans-serif',
  traditional: '"Noto Serif SC", "MingLiU", serif'
};

// DOM refs
var canvas = document.getElementById('glyph-canvas');
var ctx = canvas.getContext('2d');
// Retina / HiDPI support
var DPR = window.devicePixelRatio || 1;
var CW = 600, CH = 800;
canvas.width = CW * DPR;
canvas.height = CH * DPR;
canvas.style.width = CW + 'px';
canvas.style.height = CH + 'px';
ctx.scale(DPR, DPR);
var charInput = document.getElementById('char-input');
var status = document.getElementById('status');

function setStatus(msg) { status.textContent = msg; }

// ── Preset chips ──────────────────────────────────────────────────────────────
var chipsEl = document.getElementById('preset-chips');
PRESETS.forEach(function(ch) {
  var btn = document.createElement('button');
  btn.className = 'chip';
  btn.textContent = ch;
  btn.addEventListener('click', function() {
    charInput.value = ch;
    generate();
  });
  chipsEl.appendChild(btn);
});

// ── Scheme buttons ────────────────────────────────────────────────────────────
document.getElementById('scheme-group').addEventListener('click', function(e) {
  var btn = e.target.closest('[data-scheme]');
  if (!btn) return;
  document.querySelectorAll('#scheme-group .btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  currentScheme = btn.dataset.scheme;
  var ch = charInput.value.trim();
  if (ch && glyphCache[ch]) {
    drawPoster(ch, glyphCache[ch], ETYM[ch] || null);
  }
});

// ── Font selector ─────────────────────────────────────────────────────────────
document.getElementById('font-group').addEventListener('click', function(e) {
  var btn = e.target.closest('[data-font]');
  if (!btn) return;
  document.querySelectorAll('#font-group .btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  currentFont = btn.dataset.font;
  var ch = charInput.value.trim();
  if (ch) {
    if (currentFont === 'stroke' && glyphCache[ch]) {
      drawPoster(ch, glyphCache[ch], ETYM[ch] || null);
    } else if (currentFont !== 'stroke') {
      drawPosterFont(ch, ETYM[ch] || null);
    }
  }
});

// ── Theme toggle ──────────────────────────────────────────────────────────────
var isDark = false;
document.getElementById('btn-theme').addEventListener('click', function() {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : '');
  this.textContent = isDark ? '☀' : '☽';
});

// ── Generate ──────────────────────────────────────────────────────────────────
document.getElementById('btn-generate').addEventListener('click', generate);
charInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') generate(); });

function generate() {
  var ch = charInput.value.trim();
  if (!ch) { setStatus('Please enter a character.'); return; }
  ch = ch[0];
  charInput.value = ch;

  // Font mode: render directly from browser font, no stroke data needed
  if (currentFont !== 'stroke') {
    setStatus('');
    drawPosterFont(ch, ETYM[ch] || null);
    return;
  }

  setStatus('Loading stroke data...');
  fetchGlyph(ch, function(data) {
    if (!data) {
      setStatus('No stroke data, rendering with font...');
      drawPosterFont(ch, ETYM[ch] || null);
      return;
    }
    setStatus('');
    var animOn = document.getElementById('tog-anim').checked;
    if (animOn) {
      animatePoster(ch, data, ETYM[ch] || null);
    } else {
      drawPoster(ch, data, ETYM[ch] || null);
    }
  });
}

// ── Fetch glyph data ──────────────────────────────────────────────────────────
function fetchGlyph(ch, callback) {
  if (glyphCache[ch] !== undefined) {
    callback(glyphCache[ch]);
    return;
  }
  var codepoint = ch.codePointAt(0).toString(16).toUpperCase();
  var url = 'https://cdn.jsdelivr.net/npm/hanzi-writer-data@latest/' + encodeURIComponent(ch) + '.json';
  fetch(url)
    .then(function(r) { return r.ok ? r.json() : Promise.reject('HTTP ' + r.status); })
    .then(function(data) {
      glyphCache[ch] = data;
      callback(data);
    })
    .catch(function() {
      glyphCache[ch] = null;
      callback(null);
    });
}

// ── Ink stroke renderer: solid fill + internal void holes (stamp/ink effect) ─
function renderInkStroke(ctx, strokePath, cx, cy, size, inkCol, holeSeed) {
  // Draw to offscreen canvas so we can punch holes with destination-out
  var ofc = document.createElement('canvas');
  ofc.width = size; ofc.height = size;
  var ofx = ofc.getContext('2d');

  // Fill stroke solid
  ofx.save();
  ofx.translate(size/2, size/2);
  ofx.scale(size/1024, -size/1024);
  ofx.translate(-512, -512);
  ofx.fillStyle = '#000';
  try { ofx.fill(new Path2D(strokePath)); } catch(e) {}
  ofx.restore();

  // Punch random voids (destination-out) — ink absorption simulation
  var hs = holeSeed;
  function hr() { hs=(hs*1664525+1013904223)&0x7fffffff; return hs/0x7fffffff; }
  ofx.globalCompositeOperation = 'destination-out';
  // Large voids (ink pools / dry patches)
  var nLarge = 3 + Math.floor(hr()*5);
  for (var i=0; i<nLarge; i++) {
    var vx = hr()*size, vy = hr()*size;
    var vr = size*(0.04 + hr()*0.10);
    var va = 0.5 + hr()*0.45;
    ofx.globalAlpha = va;
    ofx.beginPath(); ofx.arc(vx, vy, vr, 0, Math.PI*2); ofx.fill();
  }
  // Small grain voids
  var nSmall = 20 + Math.floor(hr()*30);
  for (var j=0; j<nSmall; j++) {
    var sx2 = hr()*size, sy2 = hr()*size;
    var sr2 = size*(0.008 + hr()*0.025);
    ofx.globalAlpha = 0.4 + hr()*0.5;
    ofx.beginPath(); ofx.arc(sx2, sy2, sr2, 0, Math.PI*2); ofx.fill();
  }
  ofx.globalCompositeOperation = 'source-over';
  ofx.globalAlpha = 1;

  // Edge splatter: small dots around stroke on offscreen
  // (drawn separately so they can overflow the stroke boundary)
  var nSplat = 8 + Math.floor(hr()*12);
  for (var k=0; k<nSplat; k++) {
    var angle = hr()*Math.PI*2;
    var dist = size*(0.35 + hr()*0.25);
    var spx = size/2 + Math.cos(angle)*dist;
    var spy = size/2 + Math.sin(angle)*dist;
    var spr = size*(0.004 + hr()*0.012);
    ofx.globalAlpha = 0.2 + hr()*0.5;
    ofx.fillStyle = '#000';
    ofx.beginPath(); ofx.arc(spx, spy, spr, 0, Math.PI*2); ofx.fill();
  }
  ofx.globalAlpha = 1;

  // Composite onto main canvas
  ctx.save();
  ctx.globalAlpha = 0.85 + hr()*0.15;
  // Tint: colorize via globalCompositeOperation trick — draw colored rect then multiply
  // Simpler: just draw offscreen as-is but tinted with fillStyle via shadow
  ctx.drawImage(ofc, cx - size/2, cy - size/2);
  ctx.restore();

  // Color tint overlay (multiply-like: draw stroke shape in ink color at low opacity)
  ctx.save();
  ctx.globalAlpha = 0.18;
  ctx.fillStyle = inkCol;
  ctx.translate(cx, cy);
  ctx.scale(size/1024, -size/1024);
  ctx.translate(-512, -512);
  try { ctx.fill(new Path2D(strokePath)); } catch(e) {}
  ctx.restore();
}

// ── Font-based poster: render char with browser font, split into N tiles ─────
function drawPosterFont(ch, etymInfo) {
  if (animTimer) { clearTimeout(animTimer); animTimer = null; }
  var sc = SCHEMES[currentScheme];
  var W = 600, H = 800;
  ctx.clearRect(0, 0, W, H);

  var ip = {
    parchment: { dark:[26,18,8],    light:[80,50,20]  },
    ink:       { dark:[10,8,4],     light:[40,30,10]  },
    night:     { dark:[192,216,255],light:[96,144,208] },
    minimal:   { dark:[17,17,17],   light:[100,100,100]}
  }[currentScheme] || { dark:[26,18,8], light:[80,50,20] };

  function inkColor(t) {
    return 'rgb('+Math.round(ip.light[0]+(ip.dark[0]-ip.light[0])*t)+','+
                  Math.round(ip.light[1]+(ip.dark[1]-ip.light[1])*t)+','+
                  Math.round(ip.light[2]+(ip.dark[2]-ip.light[2])*t)+')';
  }

  // Background
  ctx.fillStyle = sc.bg; ctx.fillRect(0,0,W,H);
  var gs = 99991; function gr(){gs=(gs*1664525+1013904223)&0x7fffffff;return gs/0x7fffffff;}
  for (var gi=0;gi<800;gi++){
    ctx.fillStyle='rgba(80,50,20,'+(0.01+gr()*0.03)+')';
    ctx.fillRect(gr()*W,gr()*H,1,1);
  }

  // Render char to large offscreen canvas
  var fontStr = FONTS[currentFont] || FONTS.serif;
  var N = 6; // split into N "pseudo-strokes" by tiling the char
  var seed = ch.codePointAt(0);
  function sr(){seed=(seed*1664525+1013904223)&0x7fffffff;return seed/0x7fffffff;}

  // Grid layout (same as stroke mode)
  var cols = Math.ceil(Math.sqrt(N * W / H));
  var rows = Math.ceil(N / cols);
  var slotW = W / cols, slotH = H / rows;

  for (var i=0; i<N; i++) {
    var col = i % cols, row = Math.floor(i/cols);
    var slotCX = slotW*(col+0.5) + (sr()-0.5)*slotW*0.5;
    var slotCY = slotH*(row+0.5) + (sr()-0.5)*slotH*0.5;
    var sz = Math.round(Math.min(slotW,slotH)*(2.5+sr()*2.0));
    var depth = 0.3+sr()*0.7;

    // Render char at sz to offscreen, with random crop offset
    var ofc = document.createElement('canvas');
    ofc.width = sz; ofc.height = sz;
    var ofx = ofc.getContext('2d');
    var fontSize = sz * 0.9;
    ofx.font = fontSize+'px '+fontStr;
    ofx.textAlign = 'center';
    ofx.textBaseline = 'middle';
    // Random position offset — each tile shows a different "part" of the char
    var offX = (sr()-0.5)*sz*0.3;
    var offY = (sr()-0.5)*sz*0.3;
    ofx.fillStyle = '#000';
    ofx.fillText(ch, sz/2+offX, sz/2+offY);

    // Punch holes (same as renderInkStroke)
    var hs = seed+i*7919; function hr2(){hs=(hs*1664525+1013904223)&0x7fffffff;return hs/0x7fffffff;}
    ofx.globalCompositeOperation='destination-out';
    for (var v=0;v<4+Math.floor(hr2()*4);v++){
      ofx.globalAlpha=0.4+hr2()*0.4;
      ofx.beginPath();ofx.arc(hr2()*sz,hr2()*sz,sz*(0.04+hr2()*0.08),0,Math.PI*2);ofx.fill();
    }
    for (var v2=0;v2<15+Math.floor(hr2()*20);v2++){
      ofx.globalAlpha=0.3+hr2()*0.5;
      ofx.beginPath();ofx.arc(hr2()*sz,hr2()*sz,sz*(0.006+hr2()*0.02),0,Math.PI*2);ofx.fill();
    }
    ofx.globalCompositeOperation='source-over'; ofx.globalAlpha=1;

    ctx.save();
    ctx.globalAlpha=0.8+hr2()*0.2;
    ctx.drawImage(ofc, slotCX-sz/2, slotCY-sz/2);
    // Color tint
    ctx.globalAlpha=0.15; ctx.fillStyle=inkColor(depth);
    ctx.fillRect(slotCX-sz/2, slotCY-sz/2, sz, sz);
    ctx.restore();
  }

  // Minimal overlay
  ctx.save();
  ctx.font='40px "Noto Serif SC",serif'; ctx.fillStyle=inkColor(1.0);
  ctx.globalAlpha=0.12; ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.fillText(ch,28,H-44); ctx.restore();
  if (etymInfo&&etymInfo.pinyin){
    ctx.save(); ctx.font='10px Outfit,sans-serif'; ctx.fillStyle=inkColor(0.8);
    ctx.globalAlpha=0.35; ctx.textAlign='left'; ctx.textBaseline='top';
    ctx.fillText(etymInfo.pinyin,28,H-36); ctx.restore();
  }
  ctx.save(); ctx.font='8px Outfit,sans-serif'; ctx.fillStyle=inkColor(0.5);
  ctx.globalAlpha=0.18; ctx.textAlign='right'; ctx.textBaseline='bottom';
  ctx.fillText('Glyph It',W-20,H-16); ctx.restore();
}

// ── Draw poster — ink stamp style ────────────────────────────────────────────
function drawPoster(ch, data, etymInfo, _strokeLimit, _dotAlphaScale) {
  if (animTimer) { clearTimeout(animTimer); animTimer = null; }
  var sc = SCHEMES[currentScheme];
  var W = 600, H = 800;
  ctx.clearRect(0, 0, W, H);

  // ── Ink color system ────────────────────────────────────────────────────────
  var inkPalettes = {
    parchment: { dark:[26,18,8],    light:[80,50,20]  },
    ink:       { dark:[10,8,4],     light:[40,30,10]  },
    night:     { dark:[192,216,255], light:[96,144,208] },
    minimal:   { dark:[17,17,17],   light:[136,136,136] }
  };
  var ip = inkPalettes[currentScheme] || inkPalettes.parchment;

  function inkColor(t) {
    var r = Math.round(ip.light[0] + (ip.dark[0] - ip.light[0]) * t);
    var g = Math.round(ip.light[1] + (ip.dark[1] - ip.light[1]) * t);
    var b = Math.round(ip.light[2] + (ip.dark[2] - ip.light[2]) * t);
    return 'rgb(' + r + ',' + g + ',' + b + ')';
  }

  // ── Background: rice paper ──────────────────────────────────────────────────
  ctx.fillStyle = sc.bg;
  ctx.fillRect(0, 0, W, H);

  // Grain texture
  var grainSeed = 99991;
  function gr() { grainSeed = (grainSeed * 1664525 + 1013904223) & 0x7fffffff; return grainSeed / 0x7fffffff; }
  ctx.save();
  for (var gi = 0; gi < 1200; gi++) {
    var gx = gr() * W;
    var gy = gr() * H;
    var ga = 0.015 + gr() * 0.035;
    ctx.fillStyle = 'rgba(80,50,20,' + ga + ')';
    ctx.fillRect(gx, gy, 1, 1);
  }
  ctx.restore();

  // Subtle horizontal fiber lines
  ctx.save();
  ctx.strokeStyle = 'rgba(120,80,40,0.035)';
  ctx.lineWidth = 0.5;
  for (var hl = 0; hl < H; hl += 22) {
    ctx.beginPath(); ctx.moveTo(0, hl); ctx.lineTo(W, hl); ctx.stroke();
  }
  ctx.restore();

  // ── Seeded random for stable stroke layout ──────────────────────────────────
  var seed = ch.codePointAt(0);
  function sr() { seed = (seed * 1664525 + 1013904223) & 0x7fffffff; return seed / 0x7fffffff; }

  var strokes = (data && data.strokes) ? data.strokes : [];
  var strokeLimit = (_strokeLimit !== undefined) ? _strokeLimit : strokes.length;
  var alphaScale = (_dotAlphaScale !== undefined) ? _dotAlphaScale : 1.0;
  var N = strokes.length;

  // ── Layout: divide canvas into zones, one stroke per zone ──────────────────
  // Each stroke gets a "slot" in a grid, then placed near slot center with jitter
  // This ensures strokes spread across the canvas without crowding
  var layout = [];
  if (N > 0) {
    // Compute grid: e.g. 4 strokes → 2×2, 6 strokes → 3×2, 9 → 3×3
    var cols = Math.ceil(Math.sqrt(N * W / H));
    var rows = Math.ceil(N / cols);
    var slotW = W / cols;
    var slotH = H / rows;
    for (var li = 0; li < N; li++) {
      var col = li % cols;
      var row = Math.floor(li / cols);
      // Center of slot
      var slotCX = slotW * (col + 0.5);
      var slotCY = slotH * (row + 0.5);
      // Jitter within slot (±25%)
      var jx = (sr() - 0.5) * slotW * 0.5;
      var jy = (sr() - 0.5) * slotH * 0.5;
      var lcx = slotCX + jx;
      var lcy = slotCY + jy;
      // Stroke size: very large relative to slot, aggressively bleed off edges
      var minSz = Math.min(slotW, slotH) * 2.5;
      var maxSz = Math.min(slotW, slotH) * 4.5;
      var lsz = minSz + sr() * (maxSz - minSz);
      var ldepth = 0.3 + sr() * 0.7;
      layout.push({ cx: lcx, cy: lcy, size: Math.round(lsz), depth: ldepth });
    }
  }

  if (strokes.length > 0) {
    // ── Ink stamp pass ────────────────────────────────────────────────────────
    for (var si = 0; si < strokeLimit; si++) {
      var sl = layout[si];
      var holeSeed = seed + si * 7919;
      renderInkStroke(ctx, strokes[si], sl.cx, sl.cy, sl.size, inkColor(sl.depth), holeSeed);
    }
  } else {
    // Fallback: font render when no stroke data
    ctx.save();
    ctx.font = '220px "Noto Serif SC", serif';
    ctx.fillStyle = inkColor(0.7);
    ctx.globalAlpha = 0.15;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(ch, W / 2, H / 2);
    ctx.restore();
  }

  // ── Minimal text overlay ────────────────────────────────────────────────────
  // Bottom-left: ghost character
  ctx.save();
  ctx.font = '40px "Noto Serif SC", serif';
  ctx.fillStyle = inkColor(1.0);
  ctx.globalAlpha = 0.12;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(ch, 28, H - 44);
  ctx.restore();

  // Pinyin below character
  if (etymInfo && etymInfo.pinyin) {
    ctx.save();
    ctx.font = '10px Outfit, sans-serif';
    ctx.fillStyle = inkColor(0.8);
    ctx.globalAlpha = 0.35;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(etymInfo.pinyin, 28, H - 36);
    ctx.restore();
  }

  // Bottom-right: "Glyph It" mark
  ctx.save();
  ctx.font = '8px Outfit, sans-serif';
  ctx.fillStyle = inkColor(0.5);
  ctx.globalAlpha = 0.18;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';
  ctx.fillText('Glyph It', W - 20, H - 16);
  ctx.restore();
}

// ── Animate strokes — reveal one by one with dot fade-in ─────────────────────
function animatePoster(ch, data, etymInfo) {
  if (!data || !data.strokes || data.strokes.length === 0) {
    drawPoster(ch, data, etymInfo);
    return;
  }
  var total = data.strokes.length;
  var fadeDuration = 500;

  // Pre-sample all stroke dots once so animation uses stable positions
  var sc2 = SCHEMES[currentScheme];
  var seed2 = ch.codePointAt(0);
  function sr2() { seed2 = (seed2 * 1664525 + 1013904223) & 0x7fffffff; return seed2 / 0x7fffffff; }
  var W = 600, H = 800;
  var preLayout = [];
  for (var li2 = 0; li2 < total; li2++) {
    var cx2 = W*0.1 + sr2() * W*0.8;
    var cy2 = H*0.05 + sr2() * H*0.9;
    var sz2 = Math.round(150 + sr2() * 280);
    var dep2 = sr2();
    preLayout.push({ cx: cx2, cy: cy2, size: sz2, depth: dep2 });
  }
  var prePts = [];
  for (var pi = 0; pi < total; pi++) {
    try { prePts.push(sampleStroke(data.strokes[pi], preLayout[pi].size)); }
    catch(e) { prePts.push([]); }
  }

  var inkPalettes2 = {
    parchment: { dark:[26,18,8],    light:[80,50,20]  },
    ink:       { dark:[10,8,4],     light:[40,30,10]  },
    night:     { dark:[192,216,255], light:[96,144,208] },
    minimal:   { dark:[17,17,17],   light:[136,136,136] }
  };
  var ip2 = inkPalettes2[currentScheme] || inkPalettes2.parchment;
  function inkColor2(t) {
    var r = Math.round(ip2.light[0] + (ip2.dark[0] - ip2.light[0]) * t);
    var g = Math.round(ip2.light[1] + (ip2.dark[1] - ip2.light[1]) * t);
    var b = Math.round(ip2.light[2] + (ip2.dark[2] - ip2.light[2]) * t);
    return 'rgb(' + r + ',' + g + ',' + b + ')';
  }

  function drawDotsFor(idx, alphaScale) {
    var sl = preLayout[idx];
    var pts = prePts[idx];
    if (!pts || pts.length === 0) return;
    var dotColor = inkColor2(sl.depth);
    var ox = sl.cx - sl.size / 2;
    var oy = sl.cy - sl.size / 2;
    ctx.fillStyle = dotColor;
    for (var di = 0; di < pts.length; di++) {
      var r = 1.2 + Math.random() * 1.4;
      var a = (0.35 + Math.random() * 0.55) * alphaScale;
      ctx.globalAlpha = a;
      ctx.beginPath();
      ctx.arc(ox + pts[di][0], oy + pts[di][1], r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawBackground() {
    ctx.fillStyle = sc2.bg;
    ctx.fillRect(0, 0, W, H);
    var grainSeed = 99991;
    function gr2() { grainSeed = (grainSeed * 1664525 + 1013904223) & 0x7fffffff; return grainSeed / 0x7fffffff; }
    ctx.save();
    for (var gi = 0; gi < 1200; gi++) {
      var gx = gr2() * W;
      var gy = gr2() * H;
      var ga = 0.015 + gr2() * 0.035;
      ctx.fillStyle = 'rgba(80,50,20,' + ga + ')';
      ctx.fillRect(gx, gy, 1, 1);
    }
    ctx.restore();
    ctx.save();
    ctx.strokeStyle = 'rgba(120,80,40,0.035)';
    ctx.lineWidth = 0.5;
    for (var hl = 0; hl < H; hl += 22) {
      ctx.beginPath(); ctx.moveTo(0, hl); ctx.lineTo(W, hl); ctx.stroke();
    }
    ctx.restore();
  }

  var revealedDots = []; // store revealed dot sets for redraw

  function runStroke(idx) {
    if (idx >= total) {
      drawPoster(ch, data, etymInfo);
      return;
    }
    var startTime = null;
    function fadeFrame(ts) {
      if (!startTime) startTime = ts;
      var elapsed = ts - startTime;
      var alpha = Math.min(elapsed / fadeDuration, 1);
      // Redraw background + all already-revealed strokes
      drawBackground();
      for (var ri = 0; ri < revealedDots.length; ri++) {
        drawDotsFor(revealedDots[ri], 1.0);
      }
      // Fade in current stroke
      drawDotsFor(idx, alpha);
      if (alpha < 1) {
        animTimer = requestAnimationFrame(fadeFrame);
      } else {
        revealedDots.push(idx);
        animTimer = setTimeout(function() { runStroke(idx + 1); }, 80);
      }
    }
    animTimer = requestAnimationFrame(fadeFrame);
  }

  drawBackground();
  runStroke(0);
}

// ── Wrap text helper ──────────────────────────────────────────────────────────
function wrapText(ctx, text, x, y, maxWidth, lineH) {
  var words = text.split('');
  var line = '';
  var lineY = y;
  for (var i = 0; i < words.length; i++) {
    var testLine = line + words[i];
    var metrics = ctx.measureText(testLine);
    if (metrics.width > maxWidth && line.length > 0) {
      ctx.fillText(line, x, lineY);
      line = words[i];
      lineY += lineH;
    } else {
      line = testLine;
    }
  }
  if (line) ctx.fillText(line, x, lineY);
}

// ── Export ────────────────────────────────────────────────────────────────────
function exportPNG() {
  var ch = charInput.value.trim() || 'glyph';
  var link = document.createElement('a');
  link.download = 'glyph-' + ch + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}
document.getElementById('btn-export-hdr').addEventListener('click', exportPNG);
document.getElementById('btn-export-panel').addEventListener('click', exportPNG);

// ── Initial render ────────────────────────────────────────────────────────────
(function() {
  var initChar = '木';
  charInput.value = initChar;
  setStatus('Loading...');
  fetchGlyph(initChar, function(data) {
    setStatus('');
    drawPoster(initChar, data, ETYM[initChar] || null);
  });
})();

})();
</script>
